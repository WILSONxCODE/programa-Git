<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced WebGL Particle System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at 20% 20%, #1c2a4a 0%, #02020b 60%, #000000 100%);
            color: #fff;
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Advanced WebGL Particle System with Physics Simulation
        // This creates a 3D particle system with gravitational forces, collisions, and rendering optimizations

        class Particle {
            constructor(position, velocity, mass, word) {
                this.position = position.clone();
                this.velocity = velocity.clone();
                this.acceleration = new THREE.Vector3();
                this.mass = mass;
                this.radius = Math.cbrt(mass) * 0.1; // Volume-based radius
                this.color = new THREE.Color().setHSL(Math.random(), 1, 0.5);
                this.word = word;
                this.sprite = this.createSprite();
            }

            createSprite() {
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = 256;
                canvas.height = 128;

                context.font = 'bold 42px "Segoe Script", "Comic Sans MS", cursive, sans-serif';
                const gradient = context.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, '#ffd1f2');
                gradient.addColorStop(0.5, '#ff8de9');
                gradient.addColorStop(1, '#9b5ce3');
                context.fillStyle = gradient;
                context.shadowColor = 'rgba(255,255,255,0.85)';
                context.shadowBlur = 18;
                context.shadowOffsetX = 0;
                context.shadowOffsetY = 0;
                context.textAlign = 'center';
                context.textBaseline = 'middle';
                context.fillText(this.word, canvas.width / 2, canvas.height / 2);
                context.strokeStyle = 'rgba(255,255,255,0.75)';
                context.lineWidth = 2;
                context.strokeText(this.word, canvas.width / 2, canvas.height / 2);

                const texture = new THREE.CanvasTexture(canvas);
                texture.needsUpdate = true;
                const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
                const sprite = new THREE.Sprite(material);
                sprite.scale.set(3, 1.5, 1);
                return sprite;
            }

            applyForce(force) {
                const f = force.clone().divideScalar(this.mass);
                this.acceleration.add(f);
            }

            update(deltaTime) {
                this.velocity.add(this.acceleration.clone().multiplyScalar(deltaTime));
                this.position.add(this.velocity.clone().multiplyScalar(deltaTime));
                this.acceleration.set(0, 0, 0);
                this.sprite.position.copy(this.position);
            }

            checkBounds(bounds) {
                if (this.position.x < -bounds || this.position.x > bounds) this.velocity.x *= -0.9;
                if (this.position.y < -bounds || this.position.y > bounds) this.velocity.y *= -0.9;
                if (this.position.z < -bounds || this.position.z > bounds) this.velocity.z *= -0.9;
            }
        }

        class ParticleSystem {
            constructor(scene, numParticles = 1000) {
                this.particles = [];
                this.scene = scene;
                this.words = ["Amor", "Belleza", "Felicidad", "Paz", "Esperanza", "Sueño", "Magia", "Encanto", "Dulzura", "Pasión", "Alegría", "Armonía", "Luz", "Calma", "Inspiración"];

                for (let i = 0; i < numParticles; i++) {
                    const position = new THREE.Vector3(
                        (Math.random() - 0.5) * 20,
                        (Math.random() - 0.5) * 20,
                        (Math.random() - 0.5) * 20
                    );
                    const velocity = new THREE.Vector3(
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 2
                    );
                    const mass = Math.random() * 5 + 1;
                    const word = this.words[Math.floor(Math.random() * this.words.length)];
                    const particle = new Particle(position, velocity, mass, word);
                    this.particles.push(particle);
                    this.scene.add(particle.sprite);
                }
            }

            update(deltaTime) {
                // Apply gravitational forces between particles (simplified N-body)
                for (let i = 0; i < this.particles.length; i++) {
                    for (let j = i + 1; j < this.particles.length; j++) {
                        const p1 = this.particles[i];
                        const p2 = this.particles[j];
                        const distance = p1.position.distanceTo(p2.position);
                        if (distance > 0.5) {
                            const force = p1.position.clone().sub(p2.position).normalize().multiplyScalar(0.005 * p1.mass * p2.mass / (distance * distance));
                            p1.applyForce(force.clone().negate());
                            p2.applyForce(force);
                        }
                    }
                }

                // Update particles
                this.particles.forEach(particle => {
                    particle.update(deltaTime);
                    particle.checkBounds(10);
                });
            }
        }

        // Setup scene
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Add starfield background
        const starGeometry = new THREE.BufferGeometry();
        const starCount = 2000;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 2] = -Math.random() * 200 - 20;
        }
        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.8 });
        const starField = new THREE.Points(starGeometry, starMaterial);
        scene.add(starField);

        camera.position.z = 15;

        // Add particle system
        const particleSystem = new ParticleSystem(scene, 100);

        // Add controls
        const controls = {
            mouseX: 0,
            mouseY: 0
        };

        document.addEventListener('mousemove', (event) => {
            controls.mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            controls.mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        document.addEventListener('wheel', (event) => {
            camera.position.z += event.deltaY * 0.01;
            camera.position.z = Math.max(2, Math.min(50, camera.position.z)); // Clamp zoom
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === '+' || event.key === '=' || event.key === 'ArrowUp') {
                camera.position.z -= 1;
            }
            if (event.key === '-' || event.key === 'ArrowDown') {
                camera.position.z += 1;
            }
            camera.position.z = Math.max(2, Math.min(50, camera.position.z));
        });

        // Animation loop
        let lastTime = 0;
        function animate(time) {
            const deltaTime = (time - lastTime) * 0.001;
            lastTime = time;

            particleSystem.update(deltaTime);

            // Rotate camera based on mouse
            camera.position.x += (controls.mouseX * 5 - camera.position.x) * 0.05;
            camera.position.y += (controls.mouseY * 5 - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate(0);

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
